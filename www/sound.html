<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            background: black;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            width: 100vw;
            height: 100vh;

            font-family: Arial, sans-serif;
        }

        #title {
            font-size: 72px;
            font-weight: bold;
            text-align: center;

            color: #ff4444;

            text-shadow:
                0 0 10px #ff0000,
                0 0 20px #ff0000,
                0 0 40px #ff0000;

            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.05);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <h1 id="title">🔔 Báo thức!</h1>

    <audio src="alarm.mp3" autoplay></audio>

    <script src="sound.js"></script>

</body>

</html>
